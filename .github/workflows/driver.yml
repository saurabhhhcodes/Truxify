name: Driver App AI Analysis

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/driver/**'
  workflow_dispatch:

concurrency:
  group: truxify-ai-analysis-driver
  cancel-in-progress: false

jobs:
  ai-analyze-driver:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Flutter setup ───────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Dependencies
        working-directory: apps/driver
        run: flutter pub get

      # ── 3. Flutter analyze ─────────────────────────────────────────────
      - name: Flutter Analyze
        working-directory: apps/driver
        run: flutter analyze 2>&1 |
          tee "$GITHUB_WORKSPACE/driver_analyze.txt" || true

      # ── 4. Check source hash ───────────────────────────────────────────
      - name: Check Source Hash
        id: source_hash
        working-directory: apps/driver
        run: |
          HASH=$(
            (
              find lib -name "*.dart" \
                ! -name "*.g.dart" \
                ! -name "*.freezed.dart" \
                ! -name "*.gen.dart" \
                2>/dev/null | sort | xargs cat
              cat pubspec.yaml 2>/dev/null || true
            ) | sha256sum | cut -d' ' -f1
          )
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Source hash: $HASH"

          HASH_FILE="$GITHUB_WORKSPACE/.github/last_scan_hash_driver.txt"
          if [ -f "$HASH_FILE" ]; then
            LAST=$(cat "$HASH_FILE")
            if [ "$HASH" = "$LAST" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "Driver app unchanged since last scan — skipping AI"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Driver app changed — will run AI analysis"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No previous hash found — first scan"
          fi

      # ── 5. Collect files ───────────────────────────────────────────────
      - name: Collect Driver App Files
        if: steps.source_hash.outputs.changed == 'true'
        run: |
          echo "# Truxify — Driver App Full Analysis" > report.txt
          echo "Generated: $(date -u)" >> report.txt
          echo "" >> report.txt

          # Flutter analyze output
          echo "## Flutter Analyze Output" >> report.txt
          cat driver_analyze.txt >> report.txt
          echo "" >> report.txt

          # pubspec
          echo "## pubspec.yaml" >> report.txt
          echo '```yaml' >> report.txt
          cat apps/driver/pubspec.yaml >> report.txt
          echo '```' >> report.txt
          echo "" >> report.txt

          # Project structure
          echo "## Project Structure" >> report.txt
          echo '```' >> report.txt
          find apps/driver/lib \
            -not -path '*/build/*' \
            -not -path '*/.dart_tool/*' \
            | sort >> report.txt
          echo '```' >> report.txt
          echo "" >> report.txt

          # Every dart file — full content
          echo "## Dart Source Files" >> report.txt
          find apps/driver/lib \
            -name "*.dart" \
            ! -name "*.g.dart" \
            ! -name "*.freezed.dart" \
            ! -name "*.gen.dart" \
            2>/dev/null | sort | while read f; do
              echo "" >> report.txt
              echo "### FILE: $f" >> report.txt
              echo '```dart' >> report.txt
              cat "$f" >> report.txt
              echo '```' >> report.txt
          done

          # Debug stats
          TOTAL=$(find apps/driver/lib -name "*.dart" \
            ! -name "*.g.dart" 2>/dev/null | wc -l)
          SIZE=$(wc -c < report.txt)
          echo "" >> report.txt
          echo "## Scan Stats" >> report.txt
          echo "Total dart files: $TOTAL" >> report.txt
          echo "Report size: $SIZE bytes" >> report.txt

          echo "=== COLLECTION COMPLETE ==="
          echo "Dart files found: $TOTAL"
          echo "Report size: $SIZE bytes"

          # Cap at 55000 bytes for API limits
          head -c 55000 report.txt > report_safe.txt
          mv report_safe.txt report.txt
          echo "Final report size: $(wc -c < report.txt) bytes"

      # ── 6. Ensure labels exist ─────────────────────────────────────────
      - name: Ensure Labels Exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'flutter-ai-analysis', color: '0075ca',
                description: 'Flagged by AI code scanner' },
              { name: 'ai-generated',        color: 'e4e669',
                description: 'Created by AI analysis' },
              { name: 'critical',            color: 'd73a4a',
                description: 'Critical severity' },
              { name: 'high',                color: 'e99695',
                description: 'High severity' },
              { name: 'medium',              color: 'f9d0c4',
                description: 'Medium severity' },
              { name: 'low',                 color: 'cfd3d7',
                description: 'Low severity' },
              { name: 'flutter',             color: '54C5F8',
                description: 'Flutter related' },
              { name: 'driver-app',          color: 'e65100',
                description: 'Driver app specific' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ...label,
                });
                console.log(`Created label: ${label.name}`);
              } catch (err) {
                if (err.status !== 422) throw err;
                console.log(`Label already exists: ${label.name}`);
              }
            }

      # ── 7. AI Analysis ─────────────────────────────────────────────────
      - name: AI Analysis
        id: ai_analysis
        if: steps.source_hash.outputs.changed == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
        run: |
          PROJECT_DATA=$(cat report.txt)

          PROMPT="You are a senior Flutter engineer doing
          a thorough file-by-file code review of the
          Truxify driver Flutter web app (apps/driver).

          This app is a freight marketplace driver interface
          built with Flutter web, DM Sans font, maroon theme
          (#8B1A1A), and mock data only (no backend yet).

          I am giving you the COMPLETE source code of every
          file. Read each file carefully and find REAL
          specific issues with file names and line numbers.

          For EVERY dart file check ALL of the following:

          PERFORMANCE:
          - Widgets missing const constructors where all
            parameters are compile-time constants
          - setState() calls that rebuild more of the tree
            than necessary — should use smaller StatefulWidgets
          - Heavy build() methods over 100 lines that need
            splitting into smaller widgets
          - Missing keys on list items in ListView.builder

          MEMORY LEAKS:
          - TextEditingController not disposed in dispose()
          - AnimationController not disposed in dispose()
          - ScrollController not disposed in dispose()
          - StreamSubscription not cancelled in dispose()
          - FocusNode not disposed in dispose()

          CODE QUALITY:
          - Hardcoded color values like Color(0xFF8B1A1A)
            instead of using kPrimary from app_colors.dart
          - Hardcoded strings that should be constants
          - Magic numbers that should be named constants
          - Dead code — variables declared but never used
          - Commented out code blocks left in files
          - print() statements left in production code

          SAFETY:
          - async functions missing try/catch error handling
          - List or Map access without null or bounds check
          - Navigator operations without null safety
          - Missing mounted check after async gaps in widgets

          STRUCTURE:
          - Widget files over 200 lines that need splitting
          - Logic mixed into UI widgets that belongs in
            a separate service or helper class
          - Duplicate code appearing in multiple files
          - Import statements that are unused

          NAMING:
          - Files not following snake_case convention
          - Classes not following PascalCase convention
          - Private variables not starting with underscore
            where they should be private

          Report ONLY issues you can actually see in the
          provided code. Do NOT invent issues.
          Include exact file path and line number for every
          issue where possible.

          Use this EXACT format for each issue — no exceptions:

          ISSUE_START
          title: [CODE:file_slug] Short description max 6 words
          severity: critical|high|medium|low
          category: <full category name>
          file: <exact file path from root>
          line: <line number or range, e.g. 45 or 45-67>
          description: <exact description of what you see
          in the code — quote the problematic code if short>
          suggestion: <specific fix, include corrected code
          snippet if helpful>
          extra_label: <bug|enhancement|good first issue|help wanted>
          ISSUE_END

          CODE must be exactly one of:
          PE = Performance
          ML = Memory Leak
          CQ = Code Quality
          SE = Security / Safety
          ST = Structure
          NA = Naming
          MA = Maintainability

          file_slug = filename only, no path, no extension.
          Use 'project' only if truly project-wide.

          After ALL issues write:
          SUMMARY_START
          List every dart file reviewed and one line
          saying whether it is clean or has issues.
          Then write 2-3 sentences overall assessment.
          SUMMARY_END

          COMPLETE SOURCE CODE BELOW:
          $PROJECT_DATA"

          # ── Try Gemini first ───────────────────────────────────────────
          echo "Trying Gemini 2.5 Flash..."
          GEMINI_PAYLOAD=$(jq -n --arg text "$PROMPT" \
            '{contents: [{parts: [{text: $text}]}]}')

          GEMINI_STATUS=$(curl -s -w "%{http_code}" \
            -o gemini_response.json \
            --max-time 90 \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$GEMINI_PAYLOAD")

          echo "Gemini HTTP status: $GEMINI_STATUS"

          if [ "$GEMINI_STATUS" = "200" ]; then
            AI_TEXT=$(jq -r \
              '.candidates[0].content.parts[0].text // ""' \
              gemini_response.json)
            if [ -n "$AI_TEXT" ] && [ "$AI_TEXT" != "null" ]; then
              echo "$AI_TEXT" > ai_analysis.txt
              echo "AI_PROVIDER=Gemini 2.5 Flash" >> "$GITHUB_ENV"
              echo "Gemini succeeded"
              exit 0
            fi
            echo "Gemini returned empty response"
          fi

          echo "Gemini failed — trying Groq..."
          cat gemini_response.json | head -20

          # ── Fallback to Groq ───────────────────────────────────────────
          GROQ_PAYLOAD=$(jq -n --arg text "$PROMPT" \
            '{
              model: "llama-3.3-70b-versatile",
              max_tokens: 4096,
              temperature: 0.1,
              messages: [{role: "user", content: $text}]
            }')

          GROQ_STATUS=$(curl -s -w "%{http_code}" \
            -o groq_response.json \
            --max-time 90 \
            "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$GROQ_PAYLOAD")

          echo "Groq HTTP status: $GROQ_STATUS"

          if [ "$GROQ_STATUS" = "200" ]; then
            AI_TEXT=$(jq -r \
              '.choices[0].message.content // ""' \
              groq_response.json)
            if [ -n "$AI_TEXT" ] && [ "$AI_TEXT" != "null" ]; then
              echo "$AI_TEXT" > ai_analysis.txt
              echo "AI_PROVIDER=Groq (Llama 3.3 70B)" >> "$GITHUB_ENV"
              echo "Groq succeeded"
              exit 0
            fi
            echo "Groq returned empty response"
          fi

          echo "Both APIs failed"
          cat groq_response.json | head -20
          echo "API_FAILED=true" >> "$GITHUB_ENV"

      # ── 8. Create GitHub Issues ────────────────────────────────────────
      - name: Create GitHub Issues
        if: >
          env.API_FAILED != 'true' &&
          steps.source_hash.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          AI_PROVIDER: ${{ env.AI_PROVIDER }}
          COMMIT_SHA:  ${{ github.sha }}
          REPO:        ${{ github.repository }}
          RUN_ID:      ${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('ai_analysis.txt')) {
              console.log('No analysis file found — skipping.');
              return;
            }

            const analysisText =
              fs.readFileSync('ai_analysis.txt', 'utf8');

            // Extract all issue blocks
            const issueBlocks = [
              ...analysisText.matchAll(
                /ISSUE_START([\s\S]*?)ISSUE_END/g)
            ];

            const provider  = process.env.AI_PROVIDER || 'AI';
            const commitSha = process.env.COMMIT_SHA  || 'unknown';
            const repo      = process.env.REPO        || '';
            const runId     = process.env.RUN_ID      || '';

            const validExtraLabels = [
              'bug', 'enhancement',
              'good first issue', 'help wanted'
            ];

            // Fingerprint = "driver:" + [CODE:slug] from title
            // Stable across re-runs — same issue = same fingerprint
            const makeFingerprint = (title) => {
              const m = title.match(/\[([A-Z]{2}:[a-z0-9_]+)\]/i);
              const key = m
                ? m[1].toLowerCase()
                : title.toLowerCase()
                    .replace(/[^a-z0-9\s]/g, '')
                    .replace(/\s+/g, '-')
                    .trim()
                    .substring(0, 60);
              return `driver:${key}`;
            };

            const extractFingerprint = (body) => {
              const m = (body || '').match(/<!--fp:([^>]+)-->/);
              return m ? m[1].trim() : null;
            };

            const get = (text, key) => {
              const m = text.match(
                new RegExp(`${key}:\\s*([^\\n]+)`));
              return m ? m[1].trim() : 'Unknown';
            };

            if (issueBlocks.length === 0) {
              console.log('No ISSUE_START blocks found — code is clean or format mismatch.');
              console.log('First 500 chars of analysis:');
              console.log(analysisText.substring(0, 500));
              return;
            }

            console.log(`Found ${issueBlocks.length} issue blocks`);

            // Parse all issues
            const parsed = issueBlocks.map((block) => {
              const t = block[1];
              const title    = get(t, 'title');
              const sev      = get(t, 'severity').toLowerCase();
              const extraRaw = get(t, 'extra_label').toLowerCase();
              return {
                title,
                severity:    ['critical','high','medium','low']
                               .includes(sev) ? sev : 'low',
                category:    get(t, 'category'),
                file:        get(t, 'file'),
                line:        get(t, 'line'),
                description: get(t, 'description'),
                suggestion:  get(t, 'suggestion'),
                extraLabel:  validExtraLabels.includes(extraRaw)
                               ? extraRaw : null,
                fingerprint: makeFingerprint(title),
              };
            });

            // Fetch ALL existing AI issues (open + closed)
            // to prevent any duplicates across runs
            const allIssues = await github.paginate(
              github.rest.issues.listForRepo, {
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                state:    'all',
                labels:   'flutter-ai-analysis',
                per_page: 100,
              }
            );

            // Build set of existing fingerprints
            const existingFPs = new Set();
            for (const issue of allIssues) {
              const fp = extractFingerprint(issue.body || '');
              if (fp) {
                existingFPs.add(fp);
                console.log(`Existing FP: ${fp}`);
              }
            }

            console.log(`Existing fingerprints: ${existingFPs.size}`);

            const sevEmoji = {
              critical: '🔴', high: '🟠',
              medium: '🟡', low: '🔵'
            };

            let created = 0;
            let skipped = 0;

            for (const issue of parsed) {
              // Skip if fingerprint already exists (any state)
              if (existingFPs.has(issue.fingerprint)) {
                console.log(`SKIP duplicate: ${issue.fingerprint}`);
                skipped++;
                continue;
              }

              const emoji = sevEmoji[issue.severity] || '⚪';

              const labels = [
                'flutter-ai-analysis',
                'ai-generated',
                'flutter',
                'driver-app',
                issue.severity,
              ];
              if (issue.extraLabel) labels.push(issue.extraLabel);

              const body = [
                `<!--fp:${issue.fingerprint}-->`,
                ``,
                `## ${emoji} ${issue.title}`,
                ``,
                `> ⚠️ AI-generated suggestion — verify before acting.`,
                ``,
                `| Field | Value |`,
                `|---|---|`,
                `| **App** | \`driver\` |`,
                `| **Severity** | \`${issue.severity.toUpperCase()}\` |`,
                `| **Category** | ${issue.category} |`,
                `| **File** | \`${issue.file}\` |`,
                `| **Line** | \`${issue.line}\` |`,
                `| **Commit** | \`${commitSha.substring(0,7)}\` |`,
                `| **Analyzed by** | ${provider} |`,
                `| **Workflow** | [View run](https://github.com/${repo}/actions/runs/${runId}) |`,
                ``,
                `---`,
                ``,
                `### 🐛 Problem`,
                ``,
                issue.description,
                ``,
                `---`,
                ``,
                `### 💡 Suggested Fix`,
                ``,
                issue.suggestion,
                ``,
                `---`,
                ``,
                `### ✅ How to close this`,
                ``,
                `Fix the problem above and push to main.`,
                `The next scan will detect the fix and`,
                `skip creating this issue again.`,
                `Close this issue manually once resolved.`,
                ``,
                `_Generated: ${new Date().toUTCString()}_`,
              ].join('\n');

              try {
                await github.rest.issues.create({
                  owner:  context.repo.owner,
                  repo:   context.repo.repo,
                  title:  issue.title,
                  body:   body,
                  labels: labels,
                });

                // Add to set immediately to prevent
                // duplicates within the same run
                existingFPs.add(issue.fingerprint);
                created++;
                console.log(`CREATED: ${issue.title}`);
                console.log(`  FP: ${issue.fingerprint}`);

                // Respect GitHub API rate limit
                await new Promise(r => setTimeout(r, 600));

              } catch (err) {
                console.error(`Failed to create: ${issue.title}`);
                console.error(err.message);
              }
            }

            console.log('');
            console.log(`=== DONE ===`);
            console.log(`Created: ${created}`);
            console.log(`Skipped (already exist): ${skipped}`);
            console.log(`Total blocks found: ${issueBlocks.length}`);

      # ── 9. Save source hash ────────────────────────────────────────────
      - name: Save Source Hash
        if: >
          steps.source_hash.outputs.changed == 'true' &&
          env.API_FAILED != 'true'
        run: |
          mkdir -p .github
          echo "${{ steps.source_hash.outputs.hash }}" \
            > .github/last_scan_hash_driver.txt
          git config user.name  "github-actions[bot]"
          git config user.email \
            "github-actions[bot]@users.noreply.github.com"
          git add .github/last_scan_hash_driver.txt
          git commit \
            -m "chore: update driver scan hash [skip ci]" \
            || echo "Nothing to commit"
          git push