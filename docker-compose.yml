version: '3.8'

services:
  api:
    build:
      context: ./backend/api
      target: development
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./backend/api:/app
      - /app/node_modules
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
